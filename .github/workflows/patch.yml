name: Patch and Release Fonts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge wget

      - name: Patch fonts
        run: |
          chmod +x patch.sh
          ./patch.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fonts
          path: dm-mono-nerd-font/*.ttf

  release:
    needs: patch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fonts
          path: fonts

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          tar -czf "dm-mono-nerd-font-${VERSION}.tar.gz" fonts/
          echo "SHA256=$(sha256sum dm-mono-nerd-font-${VERSION}.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fonts/*.ttf
            dm-mono-nerd-font-*.tar.gz
          generate_release_notes: true

      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh api repos/kilork/homebrew-dm-mono-nerd-font/dispatches \
            -X POST \
            -F event_type="update-cask" \
            -F client_payload[version]="$VERSION" \
            -F client_payload[sha256]="$SHA256"
        continue-on-error: true