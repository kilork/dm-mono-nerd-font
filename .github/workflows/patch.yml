name: Patch and Release Fonts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge wget

      - name: Patch fonts
        run: |
          chmod +x patch.sh
          ./patch.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fonts
          path: dm-mono-nerd-font/*.ttf

  release:
    needs: patch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fonts
          path: fonts

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          tar -czf "dm-mono-nerd-font-${VERSION}.tar.gz" fonts/
          echo "SHA256=$(sha256sum dm-mono-nerd-font-${VERSION}.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fonts/*.ttf
            dm-mono-nerd-font-*.tar.gz
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          
          cp Formula/dm-mono-nerd-font.rb.tpl Formula/dm-mono-nerd-font.rb
          sed -i "s/{{VERSION}}/$VERSION/g; s/{{SHA256}}/${SHA256}/g" Formula/dm-mono-nerd-font.rb
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Formula/dm-mono-nerd-font.rb
          git commit -m "Update formula to v${VERSION}" || echo "No changes to commit"
          git push

      - name: Update Homebrew tap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          
          rm -rf /tmp/homebrew-tap
          git clone https://github.com/kilork/homebrew-dm-mono-nerd-font.git /tmp/homebrew-tap
          
          mkdir -p /tmp/homebrew-tap/Casks
          printf 'cask "dm-mono-nerd-font" do\n  version "%s"\n  sha256 "%s"\n\n  url "https://github.com/kilork/dm-mono-nerd-font/releases/download/v%s/dm-mono-nerd-font-%s.tar.gz"\n  name "DM Mono Nerd Font"\n  homepage "https://github.com/kilork/dm-mono-nerd-font"\n\n  font "dm-mono-nerd-font/DM Mono Italic Nerd Font Complete.ttf"\n  font "dm-mono-nerd-font/DM Mono Light Italic Nerd Font Complete.ttf"\n  font "dm-mono-nerd-font/DM Mono Light Nerd Font Complete.ttf"\n  font "dm-mono-nerd-font/DM Mono Medium Italic Nerd Font Complete.ttf"\n  font "dm-mono-nerd-font/DM Mono Medium Nerd Font Complete.ttf"\n  font "dm-mono-nerd-font/DM Mono Regular Nerd Font Complete.ttf"\n  font "dm-mono-nerd-font/DMMonoNerdFont-Italic.ttf"\n  font "dm-mono-nerd-font/DMMonoNerdFont-Light.ttf"\n  font "dm-mono-nerd-font/DMMonoNerdFont-LightItalic.ttf"\n  font "dm-mono-nerd-font/DMMonoNerdFont-Medium.ttf"\n  font "dm-mono-nerd-font/DMMonoNerdFont-MediumItalic.ttf"\n  font "dm-mono-nerd-font/DMMonoNerdFont-Regular.ttf"\nend\n' "$VERSION" "$SHA256" "$VERSION" "$VERSION" > /tmp/homebrew-tap/Casks/dm-mono-nerd-font.rb
          
          cd /tmp/homebrew-tap
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Casks/dm-mono-nerd-font.rb
          git commit -m "Update cask to v${VERSION}" || echo "No changes to commit"
          git push